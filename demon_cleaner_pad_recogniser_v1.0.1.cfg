[gcode_macro DEMON_CLEANER_PAD_RECOGNISER]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin CLEANER PAD RECOGNISER"
    RESPOND TYPE=command MSG="action:prompt_text Welcome to the DEMON CLEANER PAD RECOGNISER!"
    RESPOND TYPE=command MSG="action:prompt_text Current tool limitations, automated full random or full linear cleaning modes only are supported. End/park positions are set the same as the start XY positions. However values can still be changed manually after use in the cleaner settings cfg file."
    RESPOND TYPE=command MSG="action:prompt_text With continued dev time this system could be improved, please consider supporting the DKEU project to help encourge this!"
    RESPOND TYPE=command MSG="action:prompt_text Make setting up your nozzle cleaning system super easy! With this tool we will take you through a fully guided & interactive process of finding your cleaner pad/brush & automatically saving the values!"
    
    RESPOND TYPE=command MSG="action:prompt_footer_button QUIT|RESPOND TYPE=command MSG=action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button LOAD SAVED VALUES|_LOAD_CUR|info"
    RESPOND TYPE=command MSG="action:prompt_footer_button START FRESH|_DEMON_CLEANER_SETUP_HELPER|error"

    RESPOND TYPE=command MSG="action:prompt_show"



[gcode_macro _DCPRV_READER]
gcode:
  {% set dcpr_vars = printer["gcode_macro _DEMON_CLEANER_PAD_RECOGNISER_VARIABLES"] %}

  RESPOND TYPE=command MSG="dcprv_clean_max_y {dcpr_vars.dcprv_clean_max_y|float}"
  RESPOND TYPE=command MSG="dcprv_clean_min_y {dcpr_vars.dcprv_clean_min_y|float}"
  RESPOND TYPE=command MSG="dcprv_clean_max_x {dcpr_vars.dcprv_clean_max_x|float}"
  RESPOND TYPE=command MSG="dcprv_clean_min_x {dcpr_vars.dcprv_clean_min_x|float}"
  RESPOND TYPE=command MSG="set_rand {dcpr_vars.set_rand}"
  RESPOND TYPE=command MSG="set_lin {dcpr_vars.set_lin}"
  RESPOND TYPE=command MSG="set_dcprv_start_y {dcpr_vars.set_dcprv_start_y|float}"
  RESPOND TYPE=command MSG="set_dcprv_start_x {dcpr_vars.set_dcprv_start_x|float}"
  RESPOND TYPE=command MSG="dcprv_start_y {dcpr_vars.dcprv_start_y|float}"
  RESPOND TYPE=command MSG="dcprv_start_x {dcpr_vars.dcprv_start_x|float}"



[gcode_macro _DCPRV_RESET]
gcode:
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_rand VALUE=False
    
    # LIN RESET
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_lin_start_x VALUE=15.00
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_lin_start_y VALUE=15.00
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_z VALUE=15
        
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_lin_start_x VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_lin_start_y VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin_clean_z VALUE=False
    
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_axis VALUE='""'
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_pos_dir VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_dist_end VALUE=0.00
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_dist_move VALUE=0.00
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin_clean_axis VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin_clean_pos_dir VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin_clean_dist_end VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin_clean_dist_move VALUE=False
    
    # RAND RESET
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_start_x VALUE=15.00
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_start_y VALUE=15.00
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=rand_clean_z VALUE=15
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_start_x VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_start_y VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_rand_clean_z VALUE=False
    
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_clean_min_x VALUE=0.00
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_clean_max_x VALUE=0.00
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_clean_min_y VALUE=0.00
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_clean_max_y VALUE=0.00
    
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_clean_min_x VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_clean_max_x VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_clean_min_y VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_clean_max_y VALUE=False
    
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=edit_mode VALUE=False



[gcode_macro _LOAD_CUR]
gcode:
  {% set clean_vars = printer["gcode_macro _CLEAN_VARIABLES"] %}
  {% set dcpr_vars = printer["gcode_macro _DEMON_CLEANER_PAD_RECOGNISER_VARIABLES"] %}

  
  {% if not clean_vars.random_clean_x and not clean_vars.random_clean_y %}
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_rand VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_z VALUE={clean_vars.linear_clean_start_z|float}
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_lin_start_x VALUE={clean_vars.linear_clean_start_x|float}
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_lin_start_y VALUE={clean_vars.linear_clean_start_y|float}
    
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_axis VALUE='"{clean_vars.linear_clean_axis|string}"'
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_pos_dir VALUE={clean_vars.linear_clean_positive_dir}
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_dist_move VALUE={clean_vars.linear_clean_distance|float}

    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_lin_start_x VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_lin_start_y VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin_clean_z VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin_clean_axis VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin_clean_pos_dir VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin_clean_dist_move VALUE=True

    {% if clean_vars.linear_clean_axis|string in ['X', 'x'] %}
      {% if clean_vars.linear_clean_positive_dir %}
        SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_dist_end VALUE={clean_vars.linear_clean_start_x|float + clean_vars.linear_clean_distance|float}

      {% else %}
        SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_dist_end VALUE={clean_vars.linear_clean_start_x|float - clean_vars.linear_clean_distance|float}
      {% endif %}

    {% elif clean_vars.linear_clean_axis|string in ['Y', 'y'] %}
      {% if clean_vars.linear_clean_positive_dir %}
        SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_dist_end VALUE={clean_vars.linear_clean_start_y|float + clean_vars.linear_clean_distance|float}

      {% else %}
        SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=lin_clean_dist_end VALUE={clean_vars.linear_clean_start_y|float - clean_vars.linear_clean_distance|float}
      {% endif %}
    {% endif %}

  {% else %}
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_lin VALUE=False
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_rand VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=rand_clean_z VALUE={clean_vars.start_z|float}
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_start_x VALUE={clean_vars.start_x|float}
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_start_y VALUE={clean_vars.start_y|float}
    
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_clean_min_x VALUE={clean_vars.clean_min_x|float}
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_clean_max_x VALUE={clean_vars.clean_max_x|float}
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_clean_min_y VALUE={clean_vars.clean_min_y|float}
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=dcprv_clean_max_y VALUE={clean_vars.clean_max_y|float}

    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_start_x VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_start_y VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_rand_clean_z VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_clean_min_x VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_clean_max_x VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_clean_min_y VALUE=True
    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=set_dcprv_clean_max_y VALUE=True
  {% endif %}

    SET_GCODE_VARIABLE MACRO=_DEMON_CLEANER_PAD_RECOGNISER_VARIABLES VARIABLE=edit_mode VALUE=False

    M400
    _DEMON_CLEANER_SETUP_HELPER_LOADED


    
[gcode_macro _DEMON_CLEANER_SETUP_HELPER]
gcode:
  {% set sys_vars = printer["gcode_macro _SYSTEM_VARIABLES"] %}
  {% set start_vars = printer["gcode_macro _START_VARIABLES"] %}
  {% set core_vars = printer["gcode_macro _CORE_VARS"] %}
  {% set hardware_vars = printer["gcode_macro _HARDWARE_VARIABLES"] %}

    _WAIT_SCREEN
    _DCPRV_RESET
    BED_MESH_CLEAR
    _HOMING_HELPER
    _Z_PARK
    G0 Z15
    # _ADAPTIVE_LEVELLING
    M400
    _CLEANING_MODE



