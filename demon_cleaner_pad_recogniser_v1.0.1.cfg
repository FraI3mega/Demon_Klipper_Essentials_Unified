[gcode_macro _NOZZLE_JOGGER_Y]
gcode:
  {% set dcpr_vars = printer["gcode_macro _DEMON_CLEANER_PAD_RECOGNISER_VARIABLES"] %}

    RESPOND TYPE=command MSG="action:prompt_begin CLEANER PAD RECOGNISER"

  {% if dcpr_vars.set_rand %}
    {% if dcpr_vars.set_rand_clean_z and dcpr_vars.rand_clean_z|float < 10 %}
      G0 Z{dcpr_vars.rand_clean_z + 5}
    {% endif %}
  
    {% if not dcpr_vars.set_dcprv_start_y %}
      RESPOND TYPE=command MSG="action:prompt_text Set Position... RANDOM START Y"

    {% elif not dcpr_vars.set_dcprv_clean_min_y %}
      RESPOND TYPE=command MSG="action:prompt_text Set Position... RANDOM CLEAN MINIUM Y"

    {% elif not dcpr_vars.set_dcprv_clean_max_y %}
      RESPOND TYPE=command MSG="action:prompt_text Set Position... RANDOM CLEAN MAXIMUM Y"  
    {% endif %}
  
  {% else %}
    {% if dcpr_vars.set_lin_clean_z and dcpr_vars.lin_clean_z|float < 10 %}
      G0 Z{dcpr_vars.lin_clean_z + 5}
    {% endif %}
    
    {% if not dcpr_vars.set_dcprv_lin_start_y %}
      RESPOND TYPE=command MSG="action:prompt_text Set Position... LINEAR START Y"

    {% elif not dcpr_vars.set_lin_clean_dist_end %}
      RESPOND TYPE=command MSG="action:prompt_text Set Position... LINEAR CLEAN DISTANCE END Y"
    {% endif %}
  {% endif %}
    
    RESPOND TYPE=command MSG="action:prompt_text Move Y AXIS in a NEGATIVE direction!"
    
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button MOVE Y -0.5|_MINUS_O_FIVE_Y_MOVE|primary"
    RESPOND TYPE=command MSG="action:prompt_button MOVE Y -1|_MINUS_ONE_Y_MOVE|info"
    RESPOND TYPE=command MSG="action:prompt_button MOVE Y -5|_MINUS_FIVE_Y_MOVE|warning"
    RESPOND TYPE=command MSG="action:prompt_button MOVE Y -10|_MINUS_TEN_Y_MOVE|error"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"

    RESPOND TYPE=command MSG="action:prompt_text Move Y AXIS in a POSITIVE direction!"    

    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button MOVE Y +0.5|_PLUS_O_FIVE_Y_MOVE|primary"
    RESPOND TYPE=command MSG="action:prompt_button MOVE Y +1|_PLUS_ONE_Y_MOVE|info"
    RESPOND TYPE=command MSG="action:prompt_button MOVE Y +5|_PLUS_FIVE_Y_MOVE|warning"
    RESPOND TYPE=command MSG="action:prompt_button MOVE Y +10|_PLUS_TEN_Y_MOVE|error"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"

    RESPOND TYPE=command MSG="action:prompt_text Move X AXIS! - This is just here to help positional accuracy, it will not be stored."
    
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button MOVE X -5|_MINUS_FIVE_X_MOVE|error"
    RESPOND TYPE=command MSG="action:prompt_button MOVE X -1|_MINUS_ONE_X_MOVE|warning"
    RESPOND TYPE=command MSG="action:prompt_button MOVE X +1|_PLUS_ONE_X_MOVE|info"
    RESPOND TYPE=command MSG="action:prompt_button MOVE X +5|_PLUS_FIVE_X_MOVE|primary"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"

  {% if dcpr_vars.set_rand %}
    {% if not dcpr_vars.set_dcprv_start_y %}
      RESPOND TYPE=command MSG="action:prompt_text Move the nozzle to locate the Cleaner START position on the Y axis! DO NOT PLACE OVER THE CLEANER YET!"
      RESPOND TYPE=command MSG="action:prompt_text Set START position 5-10mm off to the side of the cleaner pad on the Y axis"

    {% elif not dcpr_vars.set_dcprv_clean_min_y %}
      RESPOND TYPE=command MSG="action:prompt_text Move the nozzle to locate the Cleaner RANDOM MIN Y position on the Y axis!"
      RESPOND TYPE=command MSG="action:prompt_text Set RANDOM MIN Y position to the side of the cleaner pad cloest to Y0.00"

    {% elif not dcpr_vars.set_dcprv_clean_max_y %}
      RESPOND TYPE=command MSG="action:prompt_text Move the nozzle to locate the Cleaner RANDOM MAX Y position on the Y axis!"
      RESPOND TYPE=command MSG="action:prompt_text Set RANDOM MAX Y position to the side of the cleaner pad furthest from Y0.00"
    {% endif %}

  {% else %}
    {% if not dcpr_vars.set_dcprv_lin_start_y %}
      RESPOND TYPE=command MSG="action:prompt_text Move the nozzle to locate the Cleaner START position on the Y axis! DO NOT PLACE OVER THE CLEANER YET!"
      RESPOND TYPE=command MSG="action:prompt_text Set START position 5mm off to the side of the cleaner pad on Y axis"

    {% elif not dcpr_vars.set_lin_clean_dist_end %}
      RESPOND TYPE=command MSG="action:prompt_text Move the nozzle to locate the Cleaner LINEAR DISTANCE END Y position on the Y axis!"
      RESPOND TYPE=command MSG="action:prompt_text Set LINEAR DISTANCE END Y to the furthest cleaning position away from start"  
    {% endif %}
  {% endif %}

    {% if not dcpr_vars.edit_mode %}
      RESPOND TYPE=command MSG="action:prompt_footer_button QUIT|RESPOND TYPE=command MSG=action:prompt_end"
      RESPOND TYPE=command MSG="action:prompt_footer_button BACK TO START|_CLEANING_MODE|info"
      RESPOND TYPE=command MSG="action:prompt_footer_button STORE|_CLEANER_PAD_RECOGNISER_STORE|error"
    {% else %}
      RESPOND TYPE=command MSG="action:prompt_footer_button CANCEL|_DCPR_RESULTS|info"
      RESPOND TYPE=command MSG="action:prompt_footer_button UPDATE SETTING|_CLEANER_PAD_RECOGNISER_STORE|error"
    {% endif %}
    
    RESPOND TYPE=command MSG="action:prompt_show"



