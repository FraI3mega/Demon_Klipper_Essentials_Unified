    RESPOND TYPE=command MSG="action:prompt_text CURRENT START POS XY..."
    RESPOND TYPE=command MSG="action:prompt_show"

    G4 P6000

    _GOING_TO_Z

    M400
    G4 P6000
    G0 Z15 F500
    M400

  {% if dcpr_vars.set_rand %}
    RESPOND TYPE=command MSG="action:prompt_begin CLEANER PAD RECOGNISER"
    RESPOND TYPE=command MSG="action:prompt_text CURRENT RANDOM CLEANING BOX... (will draw x3)"
    
    RESPOND TYPE=command MSG="action:prompt_show"

    {% if dcpr_vars.set_rand_clean_z and dcpr_vars.rand_clean_z|float < 10 %}
      G0 Z{dcpr_vars.rand_clean_z + 5}
    {% endif %}
    
    {% for passes in range(1, 4) %}
      G0 X{dcpr_vars.dcprv_clean_min_x|float} Y{dcpr_vars.dcprv_clean_min_y|float} F3600
      G4 P3000
      G0 X{dcpr_vars.dcprv_clean_min_x|float} Y{dcpr_vars.dcprv_clean_max_y|float} F3600
      G4 P3000
      G0 X{dcpr_vars.dcprv_clean_max_x|float} Y{dcpr_vars.dcprv_clean_max_y|float} F3600
      G4 P3000
      G0 X{dcpr_vars.dcprv_clean_max_x|float} Y{dcpr_vars.dcprv_clean_min_y|float} F3600
      G4 P3000
    {% endfor %}

  {% else %}
    RESPOND TYPE=command MSG="action:prompt_begin CLEANER PAD RECOGNISER"
    RESPOND TYPE=command MSG="action:prompt_text CURRENT LIEANR CLEANING PATH... (will draw x3)"
    
    RESPOND TYPE=command MSG="action:prompt_show"

    {% if dcpr_vars.set_lin_clean_z and dcpr_vars.lin_clean_z|float < 10 %}
      G0 Z{dcpr_vars.lin_clean_z + 5}
    {% endif %}
    
    {% for passes in range(1, 4) %}
      {% if dcpr_vars.lin_clean_axis|string in ['X', 'x'] %}
        G91
        {% if dcpr_vars.lin_clean_pos_dir %} 
          G0 X{dcpr_vars.lin_clean_dist_move|float} F3600
          G4 P3000
          G0 X-{dcpr_vars.lin_clean_dist_move|float} F3600
          G4 P3000
          
        {% else %}
          G0 X-{dcpr_vars.lin_clean_dist_move|float} F3600
          G4 P3000
          G0 X{dcpr_vars.lin_clean_dist_move|float} F3600
          G4 P3000
        {% endif %}
          
      {% elif dcpr_vars.lin_clean_axis|string in ['Y', 'y'] %}
        G91
        {% if dcpr_vars.lin_clean_pos_dir %}
          G0 Y{dcpr_vars.lin_clean_dist_move|float} F3600
          G4 P3000
          G0 Y-{dcpr_vars.lin_clean_dist_move|float} F3600
          G4 P3000
        
        {% else %}
          G0 Y-{dcpr_vars.lin_clean_dist_move|float} F3600
          G4 P3000
          G0 Y{dcpr_vars.lin_clean_dist_move|float} F3600
          G4 P3000
        {% endif %}
      {% endif %}
    {% endfor %}
  {% endif %}
    G90
    M400
    _WAIT_SCREEN
    M400
    G0 Z15 F500
    _Z_PARK

    _DCPR_RESULTS



[gcode_macro _DCPR_VERSION]
variable_demon_dcpr_ver: "1.0.1"
gcode:






    
