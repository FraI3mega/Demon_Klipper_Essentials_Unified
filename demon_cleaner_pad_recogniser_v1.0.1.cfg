[gcode_macro _DEMON_CLEANER_PAD_RECOGNISER_VARIABLES]

variable_set_lin: False
variable_set_rand: False

variable_dcprv_lin_start_x: 15.00
variable_dcprv_lin_start_y: 15.00
variable_lin_clean_z: 15.0
variable_set_dcprv_lin_start_x: False
variable_set_dcprv_lin_start_y: False
variable_set_lin_clean_z: False

variable_lin_clean_axis: ""
variable_lin_clean_pos_dir: False
variable_lin_clean_dist_end: 0.00
variable_lin_clean_dist_move: 0.00
variable_set_lin_clean_axis: False
variable_set_lin_clean_pos_dir: False
variable_set_lin_clean_dist_end: False
variable_set_lin_clean_dist_move: False


variable_dcprv_start_x: 15.00
variable_dcprv_start_y: 15.00
variable_rand_clean_z: 15.0
variable_set_dcprv_start_x: False
variable_set_dcprv_start_y: False
variable_set_rand_clean_z: False

variable_dcprv_clean_min_x: 0.00
variable_dcprv_clean_max_x: 0.00
variable_dcprv_clean_min_y: 0.00
variable_dcprv_clean_max_y: 0.00
variable_set_dcprv_clean_min_x: False
variable_set_dcprv_clean_max_x: False
variable_set_dcprv_clean_min_y: False
variable_set_dcprv_clean_max_y: False

variable_edit_mode: False

gcode:


[gcode_macro _DCPR_OUTPUT_TO_FILE]
gcode:
  {% set dcpr_vars = printer["gcode_macro _DEMON_CLEANER_PAD_RECOGNISER_VARIABLES"] %}

  {% if dcpr_vars.set_rand %}
    {% set mode = dcpr_vars.set_rand %}
    {% set randstartx = dcpr_vars.dcprv_start_x|float %}
    {% set randstarty = dcpr_vars.dcprv_start_y|float %}
    {% set randclnz = dcpr_vars.rand_clean_z|float %}
    {% set randclnminx = dcpr_vars.dcprv_clean_min_x|float %}
    {% set randclnmaxx = dcpr_vars.dcprv_clean_max_x|float %}
    {% set randclnminy = dcpr_vars.dcprv_clean_min_y|float %}
    {% set randclnmaxy = dcpr_vars.dcprv_clean_max_y|float %}

    RUN_SHELL_COMMAND CMD=refresh_output_file
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_mode PARAMS={mode}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_randstartx PARAMS={randstartx}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_randstarty PARAMS={randstarty}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_randclnz PARAMS={randclnz}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_randclnminx PARAMS={randclnminx}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_randclnmaxx PARAMS={randclnmaxx}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_randclnminy PARAMS={randclnminy}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_randclnmaxy PARAMS={randclnmaxy}
    M400
    RUN_SHELL_COMMAND CMD=write_rand_to_cleaner_file
    
  {% else %}
    {% set linmode = dcpr_vars.set_rand %}
    {% set linstartx = dcpr_vars.dcprv_lin_start_x|float %}
    {% set linstarty = dcpr_vars.dcprv_lin_start_y|float %}
    {% set linclnz = dcpr_vars.lin_clean_z|float %}
    {% set linclnaxis = dcpr_vars.lin_clean_axis|string %}
    {% set linclnposdir = dcpr_vars.lin_clean_pos_dir %}
    {% set linclnmove = dcpr_vars.lin_clean_dist_move|float %}

    RUN_SHELL_COMMAND CMD=refresh_output_file
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_linmode PARAMS={linmode}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_linstartx PARAMS={linstartx}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_linstarty PARAMS={linstarty}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_linclnz PARAMS={linclnz}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_linclnaxis PARAMS={linclnaxis}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_linclnposdir PARAMS={linclnposdir}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=output_to_file_linclnmove PARAMS={linclnmove}
    G4 P1000
    M400
    RUN_SHELL_COMMAND CMD=write_lin_to_cleaner_file
  {% endif %}



