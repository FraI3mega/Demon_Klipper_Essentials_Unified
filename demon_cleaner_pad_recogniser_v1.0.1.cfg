    {% endif %}
    
    {% if cur_y_pos|float < (printer.toolhead.axis_maximum.x|float / 2) %}
      G0 X{cur_x_pos|float + 5} Y{cur_y_pos|float +5} F4800

    {% elif cur_y_pos|float > (printer.toolhead.axis_maximum.x|float / 2) %}
      G0 X{cur_x_pos|float + 5} Y{cur_y_pos|float -5} F4800
    {% endif %}
    
    {% for passes in range(1, 4) %}
      G0 X{cur_x_pos|float + 10} F4800
      G0 X{cur_x_pos|float + 5} F4800
    {% endfor %}
    G0 X{cur_x_pos|float} Y{cur_y_pos|float} F4800
    G0 Z{cur_z_pos|float} F500

  {% elif cur_x_pos|float > (printer.toolhead.axis_maximum.x|float - 15) %}
    RESPOND TYPE=command MSG="Move denied! Too close to endstop for that distance!"
    {% if cur_z_pos|float < 10 %}
      G0 Z{cur_z_pos|float + 5} F6000
    {% endif %}
    
    {% if cur_y_pos|float < (printer.toolhead.axis_maximum.x|float / 2) %}
      G0 X{cur_x_pos|float - 5} Y{cur_y_pos|float +5} F4800

    {% elif cur_y_pos|float > (printer.toolhead.axis_maximum.x|float / 2) %}
      G0 X{cur_x_pos|float - 5} Y{cur_y_pos|float -5} F4800
    {% endif %}
    
    {% for passes in range(1, 4) %}
      G0 X{cur_x_pos|float - 10} F4800
      G0 X{cur_x_pos|float - 5} F4800
    {% endfor %}
    G0 X{cur_x_pos|float} Y{cur_y_pos|float} F4800
    G0 Z{cur_z_pos|float} F500

  {% else %}
    {% if cur_z_pos|float < 10 %}
      G0 Z{cur_z_pos|float + 5} F6000
    {% endif %}
        
    {% for passes in range(1, 4) %}
      G0 X{cur_x_pos|float - 2.5} F4800
      G0 X{cur_x_pos|float + 2.5} F4800
    {% endfor %}
    
    G0 X{cur_x_pos|float} Y{cur_y_pos|float} F4800
    G0 Z{cur_z_pos|float} F500
  {% endif %}



